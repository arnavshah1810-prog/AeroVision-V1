<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AeroVision - Mission Planner</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
}

header{
    text-align:center;
    padding:30px;
    background:#111;
    border-bottom:2px solid gold;
}

header h1{
    color:gold;
    font-size:3rem;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.card{
    background:#181818;
    padding:25px;
    border-radius:15px;
    margin-bottom:25px;
    border:1px solid #333;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:gold;
    color:black;
    border:none;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.results{
    margin-top:20px;
    line-height:2;
}

canvas{
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    <h1>🚀 AeroVision</h1>
    <p>Aerospace Mission Planner</p>
</header>

<div class="container">

    <div class="card">

        <h2>Mission Configuration</h2>

        <label>Rocket Type</label>
        <select id="rocket">
            <option value="falcon">Falcon Heavy</option>
            <option value="starship">Starship</option>
            <option value="sls">NASA SLS</option>
        </select>

        <label>Mission</label>
        <select id="mission">
            <option value="satellite">Satellite Launch</option>
            <option value="moon">Moon Mission</option>
            <option value="mars">Mars Mission</option>
        </select>

        <button onclick="calculateMission()">
            Calculate Mission
        </button>

        <div class="results" id="results"></div>

        <canvas id="missionChart"></canvas>

    </div>

</div>

<script>

let chart;

function calculateMission(){

    const mission = document.getElementById("mission").value;
    const rocket = document.getElementById("rocket").value;

    let fuel = 0;
    let time = 0;
    let payload = 0;

    if(mission === "satellite"){
        fuel = 500;
        time = 2;
        payload = 20;
    }

    if(mission === "moon"){
        fuel = 2500;
        time = 72;
        payload = 40;
    }

    if(mission === "mars"){
        fuel = 10000;
        time = 210;
        payload = 100;
    }

    if(rocket === "falcon"){
        payload *= 1;
    }

    if(rocket === "starship"){
        payload *= 2;
    }

    if(rocket === "sls"){
        payload *= 1.5;
    }

    document.getElementById("results").innerHTML = `
        <h3>Mission Report</h3>
        <p>⛽ Fuel Required: <b>${fuel} tons</b></p>
        <p>🕒 Travel Time: <b>${time} hours/days</b></p>
        <p>📦 Payload Capacity: <b>${payload} tons</b></p>
    `;

    const ctx = document.getElementById("missionChart");

    if(chart){
        chart.destroy();
    }

    chart = new Chart(ctx,{
        type:"bar",
        data:{
            labels:["Fuel","Travel Time","Payload"],
            datasets:[{
                label:"Mission Data",
                data:[fuel,time,payload]
            }]
        },
        options:{
            responsive:true
        }
    });
}

</script>

</body>
</html>
